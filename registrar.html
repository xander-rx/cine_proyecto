<!DOCTYPE html>
<html lang="es">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Registro - CinePlus</title>
      <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header class="login-header">
          <img src="images/icon_cineplus.png" alt="Logo CinePlus" class="logo" width="120">
          <h1 class="titulo">CinePlus</h1>
        </header>
        <main>
         <form action="#" method="post" class="login-form">
            <label for="nombre">Nombres: </label>
            <input type="text" id="nombre" name="nombre" required><br><br>

            <label for="nombre">Apellidos: </label>
            <input type="text" id="apellido" name="apellido" required><br><br>

            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" name="usuario" required><br><br>

            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" name="correo" required><br><br>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required><br><br>

            <label for="confirmar">Confirmar contraseña:</label>
            <input type="password" id="confirmar" name="confirmar" required><br><br>

            <button type="submit" class="btn-login">Registrarse</button>
         </form>

         <p class="registro-link">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
        </p>

        </main>
    </body>

    <footer class="footer">
        <div class="footer-info">
        <h3>CinePlus</h3>
        <p>Tu experiencia de cine favorita</p>
    </div>

    <div class="footer-links">
        <a href="index.html">Inicio</a>
        <a href="peliculas.html">Películas</a>
        <a href="cines.html">Cines</a>
        <a href="contacto.html">Contacto</a>
    </div>

    <div class="footer-contacto">
        <p>📞 Teléfono: (01) 123 4567</p>
        <p>✉️ Correo: contacto@cineplus.com</p>
    </div>

    <div class="footer-social">
        <a href="#">Facebook</a> | 
        <a href="#">Instagram</a> | 
        <a href="#">YouTube</a>
    </div>
    </footer>
</html>
