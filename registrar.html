<!DOCTYPE html>
<html lang="es">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Registro - CinePlus</title>
      <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header class="header-simple">
            <a href="index.html" class="logo-link">
            <img src="images/icon_cineplus.png" alt="Logo CinePlus">
            <h1>CinePlus</h1>
            </a>
        </header>

        <main>
          <form action="#" method="post" class="login-form">
            <h2>Crear Cuenta</h2>
            <input type="text" id="nombre" name="nombre" placeholder="Ingrese su Nombre" required>
            <input type="text" id="apellido" name="apellido" placeholder="Ingrese su Apellido" required>
            <input type="text" id="usuario" name="usuario" placeholder="Ingrese su Usuario" required>
            <input type="email" id="correo" name="correo" placeholder="Ingrese su Correo" required>
            <input type="password" id="password" name="password" placeholder="Ingrese su Contraseña" required minlength="6">
            <input type="password" id="confirmar" name="confirmar" placeholder="Confirmar Contraseña" required minlength="6">

            <div class="terminos">
                <input type="checkbox" id="terminos" required>
                <label for="terminos">Estoy de acuerdo con Términos y Condiciones</label>
            </div>

            <button type="submit" class="btn-login">Registrarse</button>
            <p class="registro-link">¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
        </form>

        </main>
    </body>

    <footer class="footer_index">
    <div class="footer-container">
        <div class="footer-col">
            <h3>CinePlus</h3>
            <p>Tu experiencia de cine favorita</p>
        </div>


        <div class="footer-col">
            <h4>Contacto</h4>
            <p>📞 (01) 123 4567</p>
            <p>✉️ contacto@cineplus.com</p>
        </div>

        <div class="footer-col">
            <h4>Síguenos</h4>
            <a href="https://www.facebook.com/" target="_blank">Facebook</a>
            <a href="https://www.instagram.com/" target="_blank">Instagram</a>
            <a href="https://www.youtube.com/" target="_blank">YouTube</a>
        </div>

    </div>

    <div class="footer-bottom">
        <p>© 2026 CinePlus - Todos los derechos reservados</p>
    </div>

</footer>
</html>
