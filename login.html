<!DOCTYPE html>
<html lang="es">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CinePlus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="login-header">
        <img src="images/icon_cineplus.png" alt="Logo CinePlus" class="logo" width="120">
        <h1 class="titulo">CinePlus</h1>
    </header>
    <main>
        <form action="#" method="post" class="login-form">
            <B><label for="usuario">Usuario:</label></B>
            <input type="text" id="usuario" name="usuario" required><br><br>

            <B><label for="password">Contraseña:</label></B>
            <input type="password" id="password" name="password" required><br><br>

            <button type="submit" class="btn-login">Iniciar Sesion</button>
        </form>

        <p text align="center" class="registro-link">
           ¿No tienes cuenta? <a href="registrar.html">Regístrate aquí</a>
        </p>


    </main>
</body>



<footer class="footer">
    <div class="footer-info">
        <h3>CinePlus</h3>
        <p>Tu experiencia de cine favorita</p>
    </div>

    <div class="footer-links">
        <a href="index.html">Inicio</a>
        <a href="peliculas.html">Películas</a>
        <a href="cines.html">Cines</a>
        <a href="contacto.html">Contacto</a>
    </div>

    <div class="footer-contacto">
        <p>📞 Teléfono: (01) 123 4567</p>
        <p>✉️ Correo: contacto@cineplus.com</p>
    </div>

    <div class="footer-social">
        <a href="#">Facebook</a> |

        <a href="#">YouTube</a>
    </div>
</footer>
</html>
