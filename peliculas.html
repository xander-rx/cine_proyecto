<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Cine</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

<header>
    <h1>Catálogo de Películas</h1>
</header>

<section class="catalogo">

    <div class="pelicula">
        <img src="avatar.jpg" alt="Avatar">
        <h3>Avatar</h3>
        <p>Película de ciencia ficción y aventura.</p>
    </div>

    <div class="pelicula">
        <img src="spiderman.jpg" alt="Spiderman">
        <h3>Spiderman</h3>
        <p>Película de acción y superhéroes.</p>
    </div>

    <div class="pelicula">
        <img src="frozen.jpg" alt="Frozen">
        <h3>Frozen</h3>
        <p>Película animada de Disney.</p>
    </div>

    <div class="pelicula">
        <img src="jurassic.jpg" alt="Jurassic World">
        <h3>Jurassic World</h3>
        <p>Película de aventura con dinosaurios.</p>
    </div>

</section>

</body>
</html>
